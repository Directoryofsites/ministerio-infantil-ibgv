<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IBGV Formulario Nueva Clase</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec1313",
              "background-light": "#f8f6f6",
              "background-dark": "#221010",
            },
            fontFamily: {
              "display": ["Lexend"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Lexend', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .ios-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden max-w-md mx-auto bg-white dark:bg-background-dark">
<!-- Header / TopAppBar -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-slate-100 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">close</span>
</div>
<div class="flex flex-col items-center flex-1">
<div class="h-6 w-auto mb-1 flex items-center justify-center">
<span class="text-primary font-bold tracking-tighter text-sm">GRACIA Y VIDA</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Nueva Clase</h2>
</div>
<div class="flex w-12 items-center justify-end">
<button class="flex items-center justify-center rounded-xl h-12 bg-transparent text-primary p-0">
<span class="material-symbols-outlined">check_circle</span>
</button>
</div>
</div>
<div class="flex flex-col p-4 space-y-6">
<!-- Hero Image Placeholder -->
<div class="@container">
<div class="w-full bg-primary/5 dark:bg-primary/10 flex flex-col items-center justify-center overflow-hidden rounded-xl min-h-[160px] border-2 border-dashed border-primary/20">
<span class="material-symbols-outlined text-primary text-4xl mb-2">auto_stories</span>
<p class="text-primary font-medium text-sm">Planificación Dominical</p>
</div>
</div>
<!-- General Info Section -->
<section class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-xl">calendar_today</span>
<h3 class="text-slate-900 dark:text-slate-100 text-md font-bold leading-tight">Información General</h3>
</div>
<div class="space-y-4">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Fecha de la Clase</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark h-14 p-4 text-base font-normal" type="date"/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Título de la Lección</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark h-14 placeholder:text-slate-400 p-4 text-base font-normal" placeholder="Ej. El Arca de Noé"/>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Pasaje Bíblico</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark h-14 placeholder:text-slate-400 p-4 text-base font-normal" placeholder="Ej. Génesis 6:1-9:17"/>
</label>
</div>
</section>
<!-- Assignment Section -->
<section class="space-y-4 pt-2">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-xl">group</span>
<h3 class="text-slate-900 dark:text-slate-100 text-md font-bold leading-tight">Asignación de Maestros</h3>
</div>
<div class="grid grid-cols-1 gap-4">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Maestro 3-7 años</p>
<select class="form-select flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark h-14 p-4 text-base font-normal appearance-none">
<option value="">Seleccionar maestro</option>
<option>Ana Martínez</option>
<option>Carlos Ruiz</option>
</select>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Maestro 8-11 años</p>
<select class="form-select flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark h-14 p-4 text-base font-normal appearance-none">
<option value="">Seleccionar maestro</option>
<option>David Espinoza</option>
<option>Lucía Gómez</option>
</select>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Maestro Adolescentes</p>
<select class="form-select flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark h-14 p-4 text-base font-normal appearance-none">
<option value="">Seleccionar maestro</option>
<option>Roberto Díaz</option>
<option>Marta Solís</option>
</select>
</label>
</div>
</section>
<!-- Detailed Content Section -->
<section class="space-y-4 pt-2">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-xl">edit_note</span>
<h3 class="text-slate-900 dark:text-slate-100 text-md font-bold leading-tight">Contenido de la Clase</h3>
</div>
<div class="space-y-4">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Énfasis Principal</p>
<textarea class="form-textarea flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark min-h-[120px] p-4 text-base font-normal resize-none" placeholder="Describe el punto central de la lección..."></textarea>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 px-1">Estructura del Pasaje y Teología</p>
<textarea class="form-textarea flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark min-h-[160px] p-4 text-base font-normal resize-none" placeholder="Desglose de los versículos y verdades teológicas..."></textarea>
</label>
</div>
</section>
<!-- Actions -->
<div class="flex flex-col gap-3 pt-6 pb-10">
<button class="w-full h-14 bg-primary text-white font-bold rounded-xl active:scale-[0.98] transition-transform shadow-lg shadow-primary/20">
                    Guardar Clase
                </button>
<button class="w-full h-14 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold rounded-xl active:scale-[0.98] transition-transform">
                    Cancelar
                </button>
</div>
</div>
<!-- IOS Indicator -->
<div class="flex justify-center pb-2">
<div class="w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</body></html>
